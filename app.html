<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Protegido - Produx</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#235691">
    <script>
        if ('serviceWorker' in navigator) {

    <style>
        :root {
            --primary: #235691;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
            overflow: auto;
        }
        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.6s ease-out;
        }

        .info-box {
            margin-top: 1.75rem;
            background: rgba(255,255,255,0.04);
            padding: 1rem 1rem 0.95rem;
            border-radius: 1rem;
            text-align: left;
            color: var(--text-dim);
            font-size: 0.92rem;
            line-height: 1.6;
        }
        .info-box strong {
            display: block;
            color: white;
            margin-bottom: 0.5rem;
            font-size: 0.98rem;
        }
        @media (max-width: 520px) {
            .container {
                padding: 1.5rem;
                max-width: 100%;
            }
            .banner {
                padding: 0.9rem 0.9rem 0.75rem;
                margin-bottom: 1.25rem;
            }
            .banner strong {
                font-size: 0.95rem;
            }
            .banner span,
            .info-box {
                font-size: 0.85rem;
            }
            .input-group {
                margin-bottom: 1.15rem;
            }
            button {
                padding: 0.95rem;
                font-size: 0.95rem;
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: inline-block;
            filter: drop-shadow(0 0 10px var(--primary));
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; font-weight: 700; }
        p { color: var(--text-dim); margin-bottom: 2rem; font-size: 0.9rem; }
        .input-group { margin-bottom: 1.5rem; position: relative; }
        input {
            width: 100%;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
            text-align: center;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(35, 86, 145, 0.2); }
        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { background: #2d69af; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        #error { color: #ef4444; font-size: 0.85rem; margin-top: 1rem; display: none; }
        .loader {
            display: none;
            margin: 1rem auto;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

        <div class="icon">🛡️</div>
        <h1>Acceso Protegido</h1>

        </div>

    <script>
        const unlockBtn = document.getElementById('unlockBtn');
        const passInput = document.getElementById('password');
        const errorMsg = document.getElementById('error');
        const spinner = document.getElementById('spinner');

        async function decrypt() {
            const password = passInput.value;
            if (!password) return;

            errorMsg.style.display = 'none';
            unlockBtn.style.display = 'none';
            spinner.style.display = 'block';

            try {
                const payload = JSON.parse(document.getElementById('payload').textContent);
                const salt = Uint8Array.from(atob(payload.salt), c => c.charCodeAt(0));
                const iv = Uint8Array.from(atob(payload.iv), c => c.charCodeAt(0));
                const encryptedData = Uint8Array.from(atob(payload.data), c => c.charCodeAt(0));

                const encoder = new TextEncoder();
                const baseKey = await crypto.subtle.importKey(
                    'raw',
                    encoder.encode(password),
                    'PBKDF2',
                    false,
                    ['deriveKey']
                );

                const key = await crypto.subtle.deriveKey(
                    {
                        name: 'PBKDF2',
                        salt: salt,
                        iterations: payload.iter,
                        hash: 'SHA-256'
                    },
                    baseKey,
                    { name: 'AES-CBC', length: 256 },
                    false,
                    ['decrypt']
                );

                const decrypted = await crypto.subtle.decrypt(
                    { name: 'AES-CBC', iv: iv },
                    key,
                    encryptedData
                );

                const decoded = new TextDecoder().decode(decrypted);
                
                // Replace content
                document.open();
                document.write(decoded);
                document.close();

            } catch (e) {
                console.error(e);
                errorMsg.style.display = 'block';
                unlockBtn.style.display = 'block';
                spinner.style.display = 'none';
            }
        }

        unlockBtn.addEventListener('click', decrypt);
        passInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') decrypt();
        });
    </script>
